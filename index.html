<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FocusZone"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>FocusZone — Studia con Intenzione</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Outfit:wght@100;200;300&display=swap" rel="stylesheet"/>
<style>
/* ─── CSS VARIABLES ─────────────────────────────────────── */
:root {
  --bg:        #0b0e17;
  --bg2:       #111827;
  --bg3:       #1a2235;
  --surface:   rgba(255,255,255,0.04);
  --border:    rgba(255,255,255,0.08);
  --text:      #e8eaf0;
  --text-muted:#7a8299;
  --accent:    #7c9cff;
  --accent2:   #c084fc;
  --accent3:   #34d399;
  --danger:    #f87171;
  --glow:      rgba(124,156,255,0.15);
  --radius:    14px;
  --radius-sm: 8px;
  --shadow:    0 8px 32px rgba(0,0,0,0.4);
  --font-display: 'DM Serif Display', serif;
  --font-mono:    'Outfit', sans-serif;
  --font-body:    'DM Sans', sans-serif;
  --transition:   0.2s ease;
}
[data-theme="light"] {
  --bg:        #f0f2f8;
  --bg2:       #ffffff;
  --bg3:       #e8ecf5;
  --surface:   rgba(0,0,0,0.03);
  --border:    rgba(0,0,0,0.08);
  --text:      #1a1f30;
  --text-muted:#6b7280;
  --accent:    #4f6ef7;
  --accent2:   #8b5cf6;
  --accent3:   #059669;
  --glow:      rgba(79,110,247,0.12);
  --shadow:    0 8px 32px rgba(0,0,0,0.12);
}

/* ─── RESET & BASE ───────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--font-body);
  background:transparent;
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  transition:color 0.4s;
}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-variant-emoji:text;outline:none;}
button:focus{outline:none;}
input,textarea{font-family:inherit;}
/* forza tutti i simboli unicode a essere testo, non emoji */
button, .ctrl-btn, .sound-toggle, .sp-btn {
  font-variant-emoji: text;
}

/* ─── CANVAS BACKGROUND ──────────────────────────────────── */
#bg-canvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;pointer-events:none;opacity:1;
}
/* dark base layer behind canvas */
#bg-base{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:-1;pointer-events:none;
  background:var(--bg);transition:background 0.4s;
}

/* ─── LAYOUT ─────────────────────────────────────────────── */
.app{position:relative;z-index:1;display:grid;grid-template-rows:auto 1fr auto;min-height:100vh;}

/* ─── TOPBAR ─────────────────────────────────────────────── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;
  background:rgba(11,14,23,0.7);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
[data-theme="light"] .topbar{background:rgba(240,242,248,0.85);}
.logo{
  font-family:var(--font-display);
  font-size:1.4rem;
  letter-spacing:-0.02em;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.topbar-actions{display:flex;gap:10px;align-items:center;}
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);background:var(--surface);border:1px solid var(--border);
  font-size:1rem;transition:all var(--transition);
}
.icon-btn:hover{color:var(--text);border-color:var(--accent);background:var(--glow);}

/* ─── MAIN GRID ──────────────────────────────────────────── */
.main{
  display:grid;
  grid-template-columns:minmax(0,1.1fr) 240px 360px;
  grid-template-rows:auto auto;
  gap:16px;padding:16px 40px 24px;
  max-width:1500px;margin:0 auto;width:100%;
  align-items:stretch;
}
/* timer: top-left */
.timer-card{grid-column:1;grid-row:1;display:flex;flex-direction:column;}
/* stats column: stacked in col 2, row 1 */
.stats-col{grid-column:2;grid-row:1;display:flex;flex-direction:column;gap:16px;}
/* sounds: top-right */
.sounds-card{grid-column:3;grid-row:1;}
/* todo: bottom-left */
.todo-card{grid-column:1;grid-row:2;}
/* chart: bottom spans col 2+3 */
.chart-card-bottom{grid-column:2 / 4;grid-row:2;display:flex;flex-direction:column;}

.stat-box{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:28px 24px;
  box-shadow:var(--shadow);transition:background 0.4s;
  flex:1;
}
.stat-label{font-size:0.68rem;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;}
.stat-value{
  font-family:var(--font-mono);font-size:2.6rem;font-weight:200;
  letter-spacing:0.02em;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.stat-sub{font-size:0.72rem;color:var(--text-muted);margin-top:8px;}
.chart-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);
}
.chart-card-bottom{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:28px 32px;box-shadow:var(--shadow);
}
.chart-title{font-size:0.68rem;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:24px;}
.bar-chart{display:flex;align-items:flex-end;gap:10px;flex:1;min-height:80px;}
.bar{
  flex:1;border-radius:3px 3px 0 0;min-height:3px;
  background:linear-gradient(to top,var(--accent),var(--accent2));
  opacity:0.65;transition:all var(--transition);
}
.bar:hover{opacity:1;}
.bar-label{font-size:0.65rem;color:var(--text-muted);text-align:center;margin-top:10px;}
.bar-wrap{display:flex;flex-direction:column;flex:1;}

/* ─── CARDS ──────────────────────────────────────────────── */
.card{
  background:rgba(8,12,20,0.65);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--radius);padding:24px;
  box-shadow:0 4px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
  transition:border-color 0.4s;
}
[data-theme="light"] .card{
  background:rgba(255,255,255,0.15);
  border-color:rgba(255,255,255,0.5);
  box-shadow:0 4px 24px rgba(0,0,0,0.06);
}
.stat-box{
  background:rgba(8,12,20,0.65);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--radius);padding:28px 24px;
  box-shadow:0 4px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
  transition:background 0.4s;flex:1;
}
[data-theme="light"] .stat-box{
  background:rgba(255,255,255,0.15);
  border-color:rgba(255,255,255,0.5);
  box-shadow:0 4px 24px rgba(0,0,0,0.06);
}
.chart-card{
  background:rgba(8,12,20,0.65);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--radius);padding:20px;
  box-shadow:0 4px 24px rgba(0,0,0,0.2);
}
.chart-card-bottom{
  background:rgba(8,12,20,0.65);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--radius);padding:28px 32px;
  box-shadow:0 4px 24px rgba(0,0,0,0.2);
  display:flex;flex-direction:column;
}
[data-theme="light"] .chart-card,
[data-theme="light"] .chart-card-bottom{
  background:rgba(255,255,255,0.15);
  border-color:rgba(255,255,255,0.5);
  box-shadow:0 4px 24px rgba(0,0,0,0.06);
}
.card-title{
  font-family:var(--font-display);font-size:1.05rem;
  color:var(--text-muted);margin-bottom:20px;
  display:flex;align-items:center;gap:8px;letter-spacing:0.02em;
}
.card-title .dot{
  width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}

/* ─── TIMER CARD ─────────────────────────────────────────── */
.timer-tabs{display:flex;gap:6px;margin-bottom:28px;}
.tab-btn{
  padding:7px 16px;border-radius:20px;font-size:0.8rem;font-weight:500;
  color:var(--text-muted);border:1px solid var(--border);
  background:var(--surface);transition:all var(--transition);letter-spacing:0.03em;
}
.tab-btn.active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border-color:transparent;
  box-shadow:0 0 20px var(--glow);
}
.timer-display{
  text-align:center;padding:32px 0 24px;position:relative;
}
.timer-ring-wrap{position:relative;width:220px;height:220px;margin:0 auto;}
.timer-ring-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotate(-90deg);}
.timer-ring-bg{fill:none;stroke:var(--border);stroke-width:4;}
.timer-ring-prog{
  fill:none;stroke-width:4;stroke-linecap:round;
  stroke:url(#ringGrad);
}
.timer-time{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:var(--font-mono);font-size:3.2rem;font-weight:200;
  letter-spacing:0.06em;color:var(--text);
}
.timer-label{
  font-size:0.75rem;color:var(--text-muted);margin-top:4px;
  letter-spacing:0.1em;text-transform:uppercase;
}
.timer-controls{display:flex;gap:12px;justify-content:center;margin-top:28px;}
.ctrl-btn{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  border:1px solid var(--border);background:var(--surface);color:var(--text-muted);
  transition:all var(--transition);
}
.ctrl-btn.primary{
  width:64px;height:64px;font-size:1.3rem;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;box-shadow:0 0 24px var(--glow);
}
.ctrl-btn:hover{color:var(--text);border-color:var(--accent);background:var(--glow);}
.ctrl-btn.primary:hover{transform:scale(1.05);box-shadow:0 0 36px var(--glow);}
.timer-settings{
  display:flex;gap:12px;margin-top:20px;justify-content:center;
  flex-wrap:wrap;
}
.setting-chip{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);
  font-size:0.8rem;color:var(--text-muted);
}
.setting-chip label{font-size:0.75rem;white-space:nowrap;}
.setting-chip input[type=number]{
  width:40px;background:none;border:none;
  color:var(--text);font-family:var(--font-mono);font-size:0.85rem;
  outline:none;text-align:center;
}
.session-count{
  text-align:center;margin-top:16px;
  font-size:0.8rem;color:var(--text-muted);letter-spacing:0.05em;
}
.session-dots{display:flex;gap:6px;justify-content:center;margin-top:8px;}
.s-dot{width:10px;height:10px;border-radius:50%;background:var(--border);}
.s-dot.done{background:linear-gradient(135deg,var(--accent),var(--accent2));}

/* ─── SOUNDS CARD ────────────────────────────────────────── */
.sound-item{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
}
.sound-icon{
  width:40px;height:40px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;background:var(--surface);border:1px solid var(--border);
  flex-shrink:0;
}
.sound-icon.playing{
  background:var(--glow);border-color:var(--accent);
}
.sound-info{flex:1;min-width:0;}
.sound-name{font-size:0.85rem;font-weight:500;margin-bottom:6px;}
.vol-row{display:flex;align-items:center;gap:8px;}
.vol-slider{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;border-radius:4px;outline:none;cursor:pointer;
  background:linear-gradient(to right,var(--accent) 0%,var(--accent) var(--val,0%),var(--border) var(--val,0%));
}
.vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--accent);cursor:pointer;
  box-shadow:0 0 6px var(--glow);
}
.sound-toggle{
  width:32px;height:32px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text-muted);font-size:0.8rem;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all var(--transition);
}
.sound-toggle.on{
  background:var(--glow);border-color:var(--accent);color:var(--accent);
}

/* ─── TODO CARD ──────────────────────────────────────────── */
.todo-card{height:100%;box-sizing:border-box;}
.todo-list{display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;}
.todo-input-row{display:flex;gap:10px;margin-bottom:16px;}
.todo-input{
  flex:1;padding:10px 16px;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-size:0.9rem;outline:none;
  transition:border-color var(--transition);
}
.todo-input:focus{border-color:var(--accent);background:var(--glow);}
.todo-input::placeholder{color:var(--text-muted);}
.add-btn{
  width:40px;height:40px;border-radius:var(--radius-sm);flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:1.2rem;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);box-shadow:0 0 16px var(--glow);
}
.add-btn:hover{transform:translateY(-1px);box-shadow:0 0 24px var(--glow);}
.todo-list::-webkit-scrollbar{width:4px;}
.todo-list::-webkit-scrollbar-track{background:transparent;}
.todo-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.todo-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid var(--border);
  transition:all var(--transition);group:true;
}
.todo-item:hover{border-color:var(--accent);background:var(--glow);}
.todo-check{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;
  border:2px solid var(--border);background:none;
  display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;color:transparent;transition:all var(--transition);cursor:pointer;
}
.todo-check.done{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-color:var(--border);
  box-shadow:inset 0 0 0 4px var(--bg);
}
.todo-text{
  flex:1;font-size:0.88rem;line-height:1.4;
  outline:none;background:none;border:none;color:var(--text);
  transition:opacity var(--transition);
}
.todo-text.done{opacity:0.4;text-decoration:line-through;}
.todo-del{
  opacity:0;color:var(--danger);font-size:0.8rem;
  transition:opacity var(--transition);padding:4px;
}
.todo-item:hover .todo-del{opacity:1;}
.todo-footer{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:12px;font-size:0.78rem;color:var(--text-muted);
}
.clear-done{color:var(--text-muted);font-size:0.78rem;transition:color var(--transition);}
.clear-done:hover{color:var(--danger);}

/* ─── FOCUS MODE ─────────────────────────────────────────── */
.focus-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:var(--bg);
  flex-direction:column;align-items:center;justify-content:center;gap:24px;
  padding:60px 40px 40px;
}
.focus-overlay.active{display:flex;}
.focus-center{
  display:flex;flex-direction:column;align-items:center;gap:20px;
  width:100%;max-width:480px;
}
.focus-exit{
  position:fixed;top:18px;right:22px;
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--border);color:var(--text-muted);font-size:0.85rem;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);z-index:10;
}
.focus-exit:hover{border-color:var(--accent);color:var(--accent);}
.focus-clock{
  position:fixed;top:20px;left:28px;
  font-family:var(--font-mono);font-size:1.4rem;font-weight:200;
  color:var(--text-muted);letter-spacing:0.1em;
  pointer-events:none;
}
.focus-time{
  font-family:var(--font-mono);font-size:8rem;font-weight:100;
  letter-spacing:0.06em;line-height:1;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.focus-label{
  font-size:0.75rem;color:var(--text-muted);
  letter-spacing:0.15em;text-transform:uppercase;
}
@media(max-width:600px){.focus-time{font-size:5rem;}}

/* spotify widget nella focus mode */
.sp-widget{
  display:flex;align-items:center;gap:14px;
  padding:12px 18px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--radius);
  width:100%;max-width:420px;
}
.sp-art{
  width:44px;height:44px;border-radius:8px;flex-shrink:0;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;overflow:hidden;
}
.sp-art img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
.sp-info{flex:1;min-width:0;}
.sp-track{font-size:0.88rem;font-weight:500;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sp-artist{font-size:0.75rem;color:var(--text-muted);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sp-status{font-size:0.68rem;color:var(--text-muted);margin-top:4px;letter-spacing:0.04em;}
.sp-controls{display:flex;gap:6px;flex-shrink:0;}
.sp-btn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:var(--text-muted);font-size:0.8rem;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);cursor:pointer;
}
.sp-btn:hover{background:rgba(255,255,255,0.15);color:var(--accent);border-color:var(--accent);}
.sp-btn.play{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  color:var(--text-muted);font-size:0.8rem;
}
.sp-btn.play:hover{background:rgba(255,255,255,0.15);color:var(--accent);border-color:var(--accent);}
.sp-offline{
  font-size:0.78rem;color:var(--text-muted);text-align:center;
  padding:10px 0;font-style:italic;
}
.focus-todo{
  width:100%;max-width:420px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 24px;
  max-height:260px;
  overflow-y:auto;
}
.focus-todo::-webkit-scrollbar{width:4px;}
.focus-todo::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.focus-todo-title{
  font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:14px;
}
.focus-todo-empty{
  font-size:0.85rem;color:var(--text-muted);text-align:center;padding:12px 0;
  font-family:var(--font-display);font-style:italic;
}
.focus-todo-item{
  display:flex;align-items:center;gap:12px;
  padding:9px 0;
  border-bottom:1px solid var(--border);
}
.focus-todo-item:last-child{border-bottom:none;}
.focus-check{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  border:2px solid var(--border);background:none;
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;color:transparent;cursor:pointer;
  transition:all var(--transition);
}
.focus-check.done{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-color:var(--border);
  box-shadow:inset 0 0 0 4px var(--bg);
}
.focus-todo-text{
  font-size:0.9rem;color:var(--text);flex:1;line-height:1.4;
  transition:opacity var(--transition);
}
.focus-todo-text.done{opacity:0.35;text-decoration:line-through;}

/* ─── NOTIFICATIONS ──────────────────────────────────────── */
.notif{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg3);border:1px solid var(--accent);
  padding:12px 24px;border-radius:30px;
  font-size:0.85rem;color:var(--text);
  box-shadow:0 8px 32px var(--glow);z-index:300;
  transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
}
.notif.show{transform:translateX(-50%) translateY(0);}

/* ─── ANIM BADGE ─────────────────────────────────────────── */
.anim-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.anim-btn{
  padding:5px 12px;border-radius:20px;font-size:0.75rem;
  border:1px solid var(--border);background:var(--surface);color:var(--text-muted);
  transition:all var(--transition);
}
.anim-btn.active{background:var(--glow);border-color:var(--accent);color:var(--accent);}

/* ─── RESPONSIVE ─────────────────────────────────────────── */
@media(max-width:1100px){
  .main{grid-template-columns:1fr 240px 280px;}
}
@media(max-width:900px){
  .main{grid-template-columns:1fr 1fr;grid-template-rows:auto;}
  .timer-card{grid-column:1 / -1;grid-row:1;}
  .stats-col{grid-column:1;grid-row:2;flex-direction:row;flex-wrap:wrap;gap:10px;}
  .stats-col .stat-box{flex:1;min-width:100px;}
  .sounds-card{grid-column:2;grid-row:2;}
  .todo-card{grid-column:1;grid-row:3;}
  .chart-card-bottom{grid-column:2;grid-row:3;}
}
@media(max-width:600px){
  .main{grid-template-columns:1fr;padding-left:16px;padding-right:16px;}
  .topbar{padding-left:16px;padding-right:16px;}
  .stats-col,.sounds-card,.todo-card,.chart-card-bottom{grid-column:1;grid-row:auto;}
  .chart-card-bottom{grid-column:1;}
  .timer-time{font-size:2.4rem;}
}

/* ─── SCROLLBAR ──────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;}

/* ─── ANIMATIONS ─────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.card,.stat-box,.chart-card{animation:fadeIn 0.5s ease both;}
.timer-card{animation-delay:0.05s;}
.sounds-card{animation-delay:0.1s;}
.todo-card{animation-delay:0.15s;}
</style>

<script>
/* ══════════════════════════════════════════════════════════
   FOCUS ZONE — Main Script
═══════════════════════════════════════════════════════════ */

/* ─── THEME ──────────────────────────────────────────────── */
let dark = localStorage.getItem('fz_theme')!=='light';
function applyTheme(){
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('themeBtn').textContent=dark?'🌙':'☀️';
  localStorage.setItem('fz_theme',dark?'dark':'light');
}
function toggleTheme(){dark=!dark;applyTheme();}
applyTheme();

/* ─── NOTIFICATION ───────────────────────────────────────── */
let notifTimeout;
function showNotif(msg){
  const n=document.getElementById('notif');
  n.textContent=msg;n.classList.add('show');
  clearTimeout(notifTimeout);
  notifTimeout=setTimeout(()=>n.classList.remove('show'),3000);
}

/* ─── AUDIO ENGINE ───────────────────────────────────────── */
const AC = new (window.AudioContext||window.webkitAudioContext)();
const soundNodes={};   // per-sound: { gain, stop }
const soundGains={};   // per-sound GainNode (persists across toggle)

const SOUNDS=[
  {id:'white', label:'Rumore Bianco', icon:'〰️'},
  {id:'rain',  label:'Pioggia',       icon:'🌧'},
  {id:'cafe',  label:'Caffetteria',   icon:'☕'},
  {id:'nature',label:'Natura',        icon:'🌿'},
  {id:'fire',  label:'Fuoco',         icon:'🔥'},
];

/* ── helpers ── */
function makeGain(id, defaultVol){
  if(!soundGains[id]){
    soundGains[id]=AC.createGain();
    soundGains[id].gain.value=defaultVol;
    soundGains[id].connect(AC.destination);
  }
  return soundGains[id];
}

/* ── WHITE NOISE: flat spectrum, every frequency equally loud ── */
function startWhite(masterGain){
  const sr=AC.sampleRate, len=sr*3;
  const buf=AC.createBuffer(2,len,sr);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1);
  }
  const src=AC.createBufferSource();
  src.buffer=buf; src.loop=true;
  src.connect(masterGain);
  src.start();
  return ()=>src.stop();
}

/* ── RAIN: pink-ish noise + hi-pass to get that "shower" hiss ── */
function startRain(masterGain){
  const sr=AC.sampleRate, len=sr*4;
  const buf=AC.createBuffer(1,len,sr);
  const d=buf.getChannelData(0);
  // Voss-McCartney pink noise approximation
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for(let i=0;i<len;i++){
    const wh=Math.random()*2-1;
    b0=0.99886*b0+wh*0.0555179;
    b1=0.99332*b1+wh*0.0750759;
    b2=0.96900*b2+wh*0.1538520;
    b3=0.86650*b3+wh*0.3104856;
    b4=0.55000*b4+wh*0.5329522;
    b5=-0.7616*b5-wh*0.0168980;
    d[i]=(b0+b1+b2+b3+b4+b5+b6+wh*0.5362)*0.11;
    b6=wh*0.115926;
  }
  const src=AC.createBufferSource();
  src.buffer=buf; src.loop=true;
  // hi-pass at 800Hz to cut low rumble → gives that crisp rain hiss
  const hi=AC.createBiquadFilter();
  hi.type='highpass'; hi.frequency.value=800; hi.Q.value=0.5;
  // slight boost around 3kHz for the "droplet" texture
  const peak=AC.createBiquadFilter();
  peak.type='peaking'; peak.frequency.value=3000; peak.gain.value=6; peak.Q.value=1.5;
  src.connect(hi); hi.connect(peak); peak.connect(masterGain);
  src.start();
  return ()=>src.stop();
}

/* ── CAFÉ: low brown murmur + occasional random "clatter" transients ── */
function startCafe(masterGain){
  const sr=AC.sampleRate, len=sr*6;
  const buf=AC.createBuffer(1,len,sr);
  const d=buf.getChannelData(0);
  let prev=0;
  for(let i=0;i<len;i++){
    const wh=Math.random()*2-1;
    prev=(prev+0.02*wh)/1.02;
    d[i]=prev*3.5;
  }
  const src=AC.createBufferSource();
  src.buffer=buf; src.loop=true;
  const bp=AC.createBiquadFilter();
  bp.type='bandpass'; bp.frequency.value=600; bp.Q.value=0.4;
  src.connect(bp); bp.connect(masterGain);
  src.start();

  let alive=true;
  let tid=null;
  function scheduleClatter(){
    if(!alive) return;
    const osc=AC.createOscillator();
    const g=AC.createGain();
    const f=AC.createBiquadFilter();
    osc.type='triangle';
    osc.frequency.value=800+Math.random()*1200;
    f.type='bandpass'; f.frequency.value=1200; f.Q.value=8;
    g.gain.setValueAtTime(0,AC.currentTime);
    g.gain.linearRampToValueAtTime(0.04,AC.currentTime+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.18);
    osc.connect(f); f.connect(g); g.connect(masterGain);
    osc.start(); osc.stop(AC.currentTime+0.2);
    tid=setTimeout(scheduleClatter, 1500+Math.random()*4000);
  }
  tid=setTimeout(scheduleClatter, 800);

  return ()=>{ alive=false; clearTimeout(tid); src.stop(); };
}

/* ── NATURE: birds (sine chirps) + gentle wind (filtered pink) ── */
function startNature(masterGain){
  const sr=AC.sampleRate, len=sr*5;
  const buf=AC.createBuffer(1,len,sr);
  const d=buf.getChannelData(0);
  let b0=0,b1=0,b2=0;
  for(let i=0;i<len;i++){
    const wh=Math.random()*2-1;
    b0=0.99886*b0+wh*0.0555179;
    b1=0.99332*b1+wh*0.0750759;
    b2=0.96900*b2+wh*0.1538520;
    d[i]=(b0+b1+b2)*0.05;
  }
  const src=AC.createBufferSource();
  src.buffer=buf; src.loop=true;
  const bp=AC.createBiquadFilter();
  bp.type='bandpass'; bp.frequency.value=450; bp.Q.value=0.6;
  src.connect(bp); bp.connect(masterGain);
  src.start();

  // single-chain scheduler: one pending timeout at a time
  let alive=true;
  let tid=null;

  function chirp(){
    if(!alive) return;
    const osc=AC.createOscillator();
    const g=AC.createGain();
    const baseF=2000+Math.random()*3000;
    osc.type='sine';
    osc.frequency.setValueAtTime(baseF, AC.currentTime);
    osc.frequency.linearRampToValueAtTime(baseF*1.3, AC.currentTime+0.08);
    osc.frequency.linearRampToValueAtTime(baseF*0.95, AC.currentTime+0.18);
    g.gain.setValueAtTime(0, AC.currentTime);
    g.gain.linearRampToValueAtTime(0.06, AC.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+0.22);
    osc.connect(g); g.connect(masterGain);
    osc.start(); osc.stop(AC.currentTime+0.25);
    // schedule ONLY the next single chirp — no branching double-chirp
    const gap = Math.random() > 0.4
      ? 300 + Math.random()*200          // short gap → sounds like "twee-twee"
      : 2500 + Math.random()*3000;       // long gap → silence between calls
    tid = setTimeout(chirp, gap);
  }
  tid = setTimeout(chirp, 600);

  return ()=>{ alive=false; clearTimeout(tid); src.stop(); };
}

/* ── FIRE: crackling = filtered brown noise + random pops ── */
function startFire(masterGain){
  const sr=AC.sampleRate, len=sr*5;
  const buf=AC.createBuffer(1,len,sr);
  const d=buf.getChannelData(0);
  let prev=0;
  for(let i=0;i<len;i++){
    const wh=Math.random()*2-1;
    prev=(prev+0.02*wh)/1.02;
    d[i]=prev*4;
  }
  const src=AC.createBufferSource();
  src.buffer=buf; src.loop=true;
  const lp=AC.createBiquadFilter();
  lp.type='lowpass'; lp.frequency.value=400; lp.Q.value=0.8;
  const shelf=AC.createBiquadFilter();
  shelf.type='lowshelf'; shelf.frequency.value=150; shelf.gain.value=8;
  src.connect(lp); lp.connect(shelf); shelf.connect(masterGain);
  src.start();

  let alive=true;
  let tid=null;
  function pop(){
    if(!alive) return;
    const popBuf=AC.createBuffer(1, Math.floor(sr*0.03), sr);
    const pd=popBuf.getChannelData(0);
    for(let i=0;i<pd.length;i++) pd[i]=(Math.random()*2-1);
    const psrc=AC.createBufferSource();
    psrc.buffer=popBuf;
    const pg=AC.createGain();
    const pf=AC.createBiquadFilter();
    pf.type='bandpass'; pf.frequency.value=1200+Math.random()*2000; pf.Q.value=2;
    pg.gain.setValueAtTime(0.15+Math.random()*0.25, AC.currentTime);
    pg.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+0.04);
    psrc.connect(pf); pf.connect(pg); pg.connect(masterGain);
    psrc.start();
    tid=setTimeout(pop, 80+Math.random()*400);
  }
  tid=setTimeout(pop, 200);

  return ()=>{ alive=false; clearTimeout(tid); src.stop(); };
}

const SOUND_STARTERS={
  white: startWhite,
  rain:  startRain,
  cafe:  startCafe,
  nature:startNature,
  fire:  startFire,
};

function toggleSound(id,iconEl,toggleBtn){
  if(AC.state==='suspended') AC.resume();
  if(soundNodes[id]){
    soundNodes[id].stop();
    delete soundNodes[id];
    iconEl.classList.remove('playing');
    toggleBtn.classList.remove('on');
    toggleBtn.innerHTML='<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg>';
  } else {
    const gain=makeGain(id,0.3);
    const stopFn=SOUND_STARTERS[id](gain);
    soundNodes[id]={stop:stopFn};
    iconEl.classList.add('playing');
    toggleBtn.classList.add('on');
    toggleBtn.innerHTML='<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="1" y="1" width="4" height="10" rx="1"/><rect x="7" y="1" width="4" height="10" rx="1"/></svg>';
  }
}
function setVolume(id,val){
  if(soundGains[id]) soundGains[id].gain.value=val/100;
}
function buildSoundUI(){
  const list=document.getElementById('soundList');
  list.innerHTML='';
  SOUNDS.forEach(s=>{
    const row=document.createElement('div');row.className='sound-item';
    row.innerHTML=`
      <div class="sound-icon" id="icon_${s.id}">${s.icon}</div>
      <div class="sound-info">
        <div class="sound-name">${s.label}</div>
        <div class="vol-row">
          <input class="vol-slider" type="range" min="0" max="100" value="30"
            style="--val:30%"
            oninput="this.style.setProperty('--val',this.value+'%');setVolume('${s.id}',this.value)"/>
        </div>
      </div>
      <button class="sound-toggle" id="tog_${s.id}"
        onclick="toggleSound('${s.id}',document.getElementById('icon_${s.id}'),document.getElementById('tog_${s.id}'))"><svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg></button>
    `;
    list.appendChild(row);
  });
}
buildSoundUI();

/* ─── BELL SOUND ─────────────────────────────────────────── */
function playBell(){
  if(AC.state==='suspended')AC.resume();
  const osc=AC.createOscillator();
  const gain=AC.createGain();
  osc.type='sine';osc.frequency.value=880;
  gain.gain.setValueAtTime(0.4,AC.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+1.5);
  osc.connect(gain);gain.connect(AC.destination);
  osc.start();osc.stop(AC.currentTime+1.5);
  // second harmonic
  const osc2=AC.createOscillator();
  const g2=AC.createGain();
  osc2.type='sine';osc2.frequency.value=1320;
  g2.gain.setValueAtTime(0.15,AC.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+1);
  osc2.connect(g2);g2.connect(AC.destination);
  osc2.start();osc2.stop(AC.currentTime+1);
}

/* ─── TIMER ──────────────────────────────────────────────── */
let durations={focus:25,short:5,long:15};
let currentMode='focus';
let timeLeft=durations.focus*60;
let totalSeconds=durations.focus*60;
let running=false;
let interval=null;
let sessionInCycle=0; // 0-3
let studiedSeconds=0;
let completedSessions=parseInt(localStorage.getItem('fz_sessions_today')||0);
let lastStudyDate=localStorage.getItem('fz_last_date')||'';
let streak=parseInt(localStorage.getItem('fz_streak')||0);
let weekData=JSON.parse(localStorage.getItem('fz_week')||'[0,0,0,0,0,0,0]');

function checkDailyReset(){
  const today=new Date().toISOString().slice(0,10);
  if(lastStudyDate!==today){
    completedSessions=0;
    localStorage.setItem('fz_sessions_today','0');
  }
}
checkDailyReset();

function updateDurations(){
  durations.focus=parseInt(document.getElementById('focusDur').value)||25;
  durations.short=parseInt(document.getElementById('shortDur').value)||5;
  durations.long=parseInt(document.getElementById('longDur').value)||15;
  if(!running)resetTimer();
}
function switchMode(mode,btn){
  currentMode=mode;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  resetTimer();
}
function resetTimer(){
  clearInterval(interval);running=false;
  document.getElementById('startBtn').innerHTML='<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg>';
  timeLeft=durations[currentMode]*60;
  totalSeconds=timeLeft;
  updateDisplay();
  updateRing();
}
function setRingTransition(on){
  document.getElementById('timerRing').style.transition=
    on ? 'stroke-dasharray 1s linear, stroke-dashoffset 1s linear' : 'none';
}
function toggleTimer(){
  if(running){
    clearInterval(interval);running=false;
    setRingTransition(false);
    document.getElementById('startBtn').innerHTML='<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg>';
  } else {
    if(AC.state==='suspended')AC.resume();
    running=true;
    document.getElementById('startBtn').innerHTML='<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="1" y="1" width="4" height="10" rx="1"/><rect x="7" y="1" width="4" height="10" rx="1"/></svg>';
    setRingTransition(false);          // primo tick istantaneo
    interval=setInterval(()=>{
      setRingTransition(true);         // dal secondo tick in poi, torna fluido
      tick();
    },1000);
  }
}
function tick(){
  timeLeft--;
  if(currentMode==='focus')studiedSeconds++;
  updateDisplay();updateRing();updateStats();
  if(timeLeft<=0){
    clearInterval(interval);running=false;
    document.getElementById('startBtn').innerHTML='<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg>';
    onPhaseEnd();
  }
}
function onPhaseEnd(){
  playBell();
  if(currentMode==='focus'){
    completedSessions++;
    sessionInCycle++;
    const today=new Date().toISOString().slice(0,10);
    if(lastStudyDate!==today){
      streak++;lastStudyDate=today;
      localStorage.setItem('fz_streak',streak);
      localStorage.setItem('fz_last_date',today);
    }
    localStorage.setItem('fz_sessions_today',completedSessions);
    // week data
    const dow=new Date().getDay();
    weekData[dow]=(weekData[dow]||0)+1;
    localStorage.setItem('fz_week',JSON.stringify(weekData));
    updateStats();buildChart();
    showNotif('🎉 Sessione completata! Ottimo lavoro.');
    // auto switch to break
    if(sessionInCycle>=4){
      sessionInCycle=0;
      switchMode('long',document.querySelector('[data-mode="long"]'));
    } else {
      switchMode('short',document.querySelector('[data-mode="short"]'));
    }
    setTimeout(toggleTimer, 500); // piccolo delay per far suonare la campanella prima
  } else {
    showNotif('☕ Pausa finita — Focus!');
    switchMode('focus',document.querySelector('[data-mode="focus"]'));
    setTimeout(toggleTimer, 500);
  }
  updateSessionDots();
}
function skipPhase(){onPhaseEnd();}
function updateDisplay(){
  const m=String(Math.floor(timeLeft/60)).padStart(2,'0');
  const s=String(timeLeft%60).padStart(2,'0');
  const str=`${m}:${s}`;
  document.getElementById('timerDisplay').textContent=str;
  document.getElementById('focusBigTime').textContent=str;
  const labels={focus:'FOCUS',short:'PAUSA BREVE',long:'PAUSA LUNGA'};
  document.getElementById('focusPhaseLabel').textContent=labels[currentMode];
  document.title='FocusZone';
}
function updateRing(){
  const circ=2*Math.PI*100;
  const prog=timeLeft/totalSeconds;
  const drawn=circ*prog;
  const ring=document.getElementById('timerRing');
  ring.style.strokeDasharray=`${drawn} ${circ}`;
  ring.style.strokeDashoffset=-circ+drawn; // inizia a ore 12, si consuma da destra verso sinistra
}
function updateSessionDots(){
  const wrap=document.getElementById('sessionDots');
  wrap.innerHTML='';
  for(let i=0;i<4;i++){
    const d=document.createElement('div');
    d.className='s-dot'+(i<sessionInCycle?' done':'');
    wrap.appendChild(d);
  }
  document.getElementById('sessionText').textContent=`Sessione ${sessionInCycle+1} di 4`;
}
updateSessionDots();
updateDisplay();updateRing();

/* ─── STATS ──────────────────────────────────────────────── */
function updateStats(){
  const h=Math.floor(studiedSeconds/3600);
  const m=Math.floor((studiedSeconds%3600)/60);
  document.getElementById('statTime').textContent=`${h}h ${m}m`;
  document.getElementById('statSessions').textContent=completedSessions;
  document.getElementById('statStreak').textContent=streak;
  renderFocusStats();
}
updateStats();
function buildChart(){
  // settimana da Lun a Dom — indici JS: 1=Lun … 6=Sab, 0=Dom
  const days=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  const order=[1,2,3,4,5,6,0]; // lunedì prima
  const chart=document.getElementById('barChart');
  chart.innerHTML='';
  const max=Math.max(...weekData,1);
  for(let i=0;i<7;i++){
    const idx=order[i];
    const val=weekData[idx]||0;
    const pct=Math.max((val/max)*100,4);
    const w=document.createElement('div');w.className='bar-wrap';
    w.innerHTML=`<div class="bar" style="height:${pct}%" title="${val} sessioni"></div>
    <div class="bar-label">${days[i]}</div>`;
    chart.appendChild(w);
  }
}
buildChart();

/* ─── TODO ───────────────────────────────────────────────── */
let todos=JSON.parse(localStorage.getItem('fz_todos')||'[]');
function saveTodos(){localStorage.setItem('fz_todos',JSON.stringify(todos));}
function renderTodos(){
  const list=document.getElementById('todoList');
  list.innerHTML='';
  todos.forEach((t,i)=>{
    const item=document.createElement('div');item.className='todo-item';
    item.innerHTML=`
      <button class="todo-check ${t.done?'done':''}" onclick="toggleTodo(${i})">
      </button>
      <div class="todo-text ${t.done?'done':''}" contenteditable="true"
        onblur="editTodo(${i},this.textContent)">${escHtml(t.text)}</div>
      <button class="todo-del" onclick="deleteTodo(${i})">✕</button>
    `;
    list.appendChild(item);
  });
  const total=todos.length;
  const done=todos.filter(t=>t.done).length;
  document.getElementById('todoCount').textContent=`${done}/${total} completate`;
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function addTodo(){
  const inp=document.getElementById('todoInput');
  const text=inp.value.trim();
  if(!text)return;
  todos.unshift({text,done:false,id:Date.now()});
  inp.value='';saveTodos();renderTodos();
}
function toggleTodo(i){todos[i].done=!todos[i].done;saveTodos();renderTodos();}
function deleteTodo(i){todos.splice(i,1);saveTodos();renderTodos();}
function editTodo(i,text){todos[i].text=text.trim();saveTodos();}
function clearDone(){todos=todos.filter(t=>!t.done);saveTodos();renderTodos();}
renderTodos();

/* ─── FOCUS MODE ─────────────────────────────────────────── */
function renderFocusTodos(){
  const wrap=document.getElementById('focusTodoList');
  if(!wrap) return;
  if(todos.length===0){
    wrap.innerHTML=`<div class="focus-todo-title">Le tue attività</div>
      <div class="focus-todo-empty">Nessuna attività — aggiungile prima di iniziare.</div>`;
    return;
  }
  const pending=todos.filter(t=>!t.done);
  const done=todos.filter(t=>t.done);
  const ordered=[...pending,...done];
  wrap.innerHTML=`<div class="focus-todo-title">Attività · ${pending.length} rimaste</div>`+
    ordered.map((t,idx)=>{
      const realIdx=todos.indexOf(t);
      return `<div class="focus-todo-item">
        <button class="focus-check ${t.done?'done':''}"
          onclick="toggleTodoFocus(${realIdx})">
        </button>
        <span class="focus-todo-text ${t.done?'done':''}">${escHtml(t.text)}</span>
      </div>`;
    }).join('');
}
function toggleTodoFocus(i){
  todos[i].done=!todos[i].done;
  saveTodos();
  renderTodos();       // aggiorna anche la lista principale
  renderFocusTodos();  // aggiorna la lista in focus mode
}
function renderFocusSounds(){
  const list=document.getElementById('focusSoundList');
  if(!list) return;
  list.innerHTML='';
  SOUNDS.forEach(s=>{
    const row=document.createElement('div');
    row.className='focus-sound-item';
    const isOn=!!soundNodes[s.id];
    const vol=soundGains[s.id]?Math.round(soundGains[s.id].gain.value*100):30;
    row.innerHTML=`
      <div class="focus-sound-icon ${isOn?'playing':''}" id="ficon_${s.id}">${s.icon}</div>
      <span class="focus-sound-name">${s.label}</span>
      <input class="focus-vol" type="range" min="0" max="100" value="${vol}"
        style="--val:${vol}%"
        oninput="this.style.setProperty('--val',this.value+'%');setVolume('${s.id}',this.value)"/>
      <button class="focus-sound-toggle ${isOn?'on':''}" id="ftog_${s.id}"
        onclick="toggleSound('${s.id}',document.getElementById('ficon_${s.id}'),document.getElementById('ftog_${s.id}'));
                 toggleSound('${s.id}',document.getElementById('icon_${s.id}'),document.getElementById('tog_${s.id}'));
                 this.classList.toggle('on');document.getElementById('ficon_${s.id}').classList.toggle('playing');">
        ${isOn?`<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="1" y="1" width="4" height="10" rx="1"/><rect x="7" y="1" width="4" height="10" rx="1"/></svg>`:`<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg>`}
      </button>
    `;
    list.appendChild(row);
  });
}
function renderFocusStats(){
  const h=Math.floor(studiedSeconds/3600);
  const m=Math.floor((studiedSeconds%3600)/60);
  const t=document.getElementById('fStatTime');
  const se=document.getElementById('fStatSessions');
  const st=document.getElementById('fStatStreak');
  if(t) t.textContent=`${h}h ${m}m`;
  if(se) se.textContent=completedSessions;
  if(st) st.textContent=streak;
}
function renderFocusChart(){
  const chart=document.getElementById('focusBarChart');
  if(!chart) return;
  const days=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  const order=[1,2,3,4,5,6,0];
  chart.innerHTML='';
  const max=Math.max(...weekData,1);
  for(let i=0;i<7;i++){
    const idx=order[i];
    const val=weekData[idx]||0;
    const pct=Math.max((val/max)*100,4);
    const w=document.createElement('div');w.className='focus-bar-wrap';
    w.innerHTML=`<div class="focus-bar" style="height:${pct}%" title="${val}"></div>
      <div class="focus-bar-label">${days[i]}</div>`;
    chart.appendChild(w);
  }
}
let clockInterval=null;
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const el=document.getElementById('focusClock');
  if(el) el.textContent=`${h}:${m}`;
}
function enterFocusMode(){
  document.getElementById('focusOverlay').classList.add('active');
  renderFocusTodos();
  renderFocusSounds();
  renderFocusStats();
  renderFocusChart();
  // schermo intero
  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen().catch(()=>{});
  }
  // avvia orologio
  updateClock();
  clockInterval=setInterval(updateClock,1000);
}
function exitFocusMode(){
  document.getElementById('focusOverlay').classList.remove('active');
  // esci da schermo intero
  if(document.fullscreenElement && document.exitFullscreen){
    document.exitFullscreen().catch(()=>{});
  }
  // ferma orologio
  clearInterval(clockInterval);clockInterval=null;
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')exitFocusMode();
  if(e.key===' '&&document.getElementById('focusOverlay').classList.contains('active')){
    e.preventDefault();toggleTimer();
  }
});

/* ─── CANVAS BACKGROUND ──────────────────────────────────── */
let animMode='stars';
const canvas=document.getElementById('bg-canvas');
const ctx=canvas.getContext('2d');
let particles=[];
let animFrame;

function resizeCanvas(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize',()=>{resizeCanvas();initParticles();});

function initParticles(){
  particles=[];
  if(animMode==='stars'||animMode==='rain'||animMode==='forest'){
    // stelle piccole sopra il fondo nebulosa
    const count = animMode==='forest' ? 60 : (animMode==='rain' ? 140 : 180);
    for(let i=0;i<count;i++){
      particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*1.4+0.2,
        alpha:Math.random()*0.6+0.2,
        speed: animMode==='rain' ? Math.random()*5+3 : Math.random()*0.15+0.03,
        twinkle:Math.random()*Math.PI*2,
        len: Math.random()*18+8, // per pioggia
        vx:(Math.random()-0.5)*0.4,
        vy:(Math.random()-0.5)*0.4,
        hue:120+Math.random()*60
      });
    }
  }
}

// nebule: blob radiali che si muovono lentamente
const nebulae=[
  {x:0.15,y:0.35,r:0.45,color:'20,40,100',  a:0.55, vx:0.00008, vy:0.00005},
  {x:0.7, y:0.2, r:0.5, color:'10,20,70',   a:0.5,  vx:-0.00006,vy:0.00007},
  {x:0.5, y:0.65,r:0.55,color:'30,20,80',   a:0.45, vx:0.00005, vy:-0.00006},
  {x:0.85,y:0.7, r:0.4, color:'15,30,90',   a:0.4,  vx:-0.00007,vy:-0.00004},
  {x:0.3, y:0.15,r:0.38,color:'40,50,110',  a:0.35, vx:0.00006, vy:0.00008},
];

function drawFrame(){
  const W=canvas.width, H=canvas.height;
  const isDark=document.documentElement.getAttribute('data-theme')!=='light';

  // sfondo base
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = isDark ? '#080c14' : '#d8dff0';
  ctx.fillRect(0,0,W,H);

  if(animMode!=='none'){
    // disegna nebule sfumate
    nebulae.forEach(n=>{
      n.x+=n.vx; n.y+=n.vy;
      if(n.x<-0.1||n.x>1.1) n.vx*=-1;
      if(n.y<-0.1||n.y>1.1) n.vy*=-1;
      const cx=n.x*W, cy=n.y*H, r=n.r*Math.max(W,H);
      const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      const alpha = isDark ? n.a : n.a*0.3;
      grad.addColorStop(0,  `rgba(${n.color},${alpha})`);
      grad.addColorStop(0.5,`rgba(${n.color},${alpha*0.4})`);
      grad.addColorStop(1,  `rgba(${n.color},0)`);
      ctx.fillStyle=grad;
      ctx.fillRect(0,0,W,H);
    });
  }

  // particelle sopra
  if(animMode==='stars'){
    particles.forEach(p=>{
      p.twinkle+=0.018;
      const a=p.alpha*(0.6+0.4*Math.sin(p.twinkle));
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${isDark?'210,220,255':'80,100,180'},${a})`;
      ctx.fill();
      p.y-=p.speed;
      if(p.y<0){p.y=H;p.x=Math.random()*W;}
    });
  } else if(animMode==='rain'){
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x-2,p.y+p.len);
      ctx.strokeStyle=`rgba(${isDark?'160,190,230':'80,120,200'},${p.alpha})`;
      ctx.lineWidth=1;ctx.stroke();
      p.y+=p.speed;
      if(p.y>H+30){p.y=-30;p.x=Math.random()*W;}
    });
  } else if(animMode==='forest'){
    particles.forEach(p=>{
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},55%,55%,${p.alpha})`;
      ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
    });
  }

  animFrame=requestAnimationFrame(drawFrame);
}
function setAnimation(mode,btn){
  animMode=mode;
  document.querySelectorAll('.anim-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  cancelAnimationFrame(animFrame);
  initParticles();
  drawFrame(); // sempre, anche per 'none' (disegna solo nebula)
}
initParticles();drawFrame();

/* ─── SPOTIFY LOCAL INTEGRATION ─────────────────────────── */
const SP_URL = 'http://127.0.0.1:9999';
let spPollInt = null;

async function spFetch(endpoint){
  try{
    const r = await fetch(SP_URL + endpoint, {signal: AbortSignal.timeout(1500)});
    return await r.json();
  } catch(e){ return null; }
}

async function spPoll(){
  const data = await spFetch('/now');
  const widget  = document.getElementById('spWidget');
  const track   = document.getElementById('spTrack');
  const artist  = document.getElementById('spArtist');
  const status  = document.getElementById('spStatus');
  const playBtn = document.getElementById('spPlayBtn');

  const PLAY  = '<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg>';
  const PAUSE = '<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="1" y="1" width="4" height="10" rx="1"/><rect x="7" y="1" width="4" height="10" rx="1"/></svg>';

  // nessun server o nessun brano → nascondi widget
  if(!data || !data.title){
    widget.style.display = 'none';
    return;
  }

  // brano rilevato → mostra widget
  widget.style.display = 'flex';
  track.textContent  = data.title;
  artist.textContent = data.artist || '';
  status.textContent = '';
  playBtn.innerHTML  = data.playing ? PAUSE : PLAY;
}

async function spControl(action){
  await spFetch('/control?action=' + action);
  // aspetta 600ms (tempo per il cambio di stato) poi rileggi
  setTimeout(spPoll, 600);
}

function startSpPoll(){ spPoll(); clearInterval(spPollInt); spPollInt = setInterval(spPoll, 2000); }
function stopSpPoll(){ clearInterval(spPollInt); spPollInt = null; }

const _origEnterFocus = enterFocusMode;
enterFocusMode = function(){ _origEnterFocus(); startSpPoll(); };
const _origExitFocus = exitFocusMode;
exitFocusMode = function(){ _origExitFocus(); stopSpPoll(); };
</script>
